nameOverride: identity
fullnameOverride: identity

image:
  repository: chirper/identity
  tag: dev

service:
  ports:
    - name: http
      port: 80
      targetPort: 4001
      containerPort: 4001
    - name: grpc
      port: 50051
      targetPort: 50051
      containerPort: 50051

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "4001"
  - name: GRPC_BIND_URL
    value: 0.0.0.0:50051

envFromSecrets:
  - chirper-database

nameOverride: realtime
fullnameOverride: realtime

image:
  repository: chirper/realtime
  tag: dev

service:
  ports:
    - name: http
      port: 80
      targetPort: 4007
      containerPort: 4007
    - name: grpc
      port: 50057
      targetPort: 50057
      containerPort: 50057

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "4007"
  - name: GRPC_BIND_URL
    value: 0.0.0.0:50057

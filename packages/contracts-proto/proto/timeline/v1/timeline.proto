syntax = "proto3";

package timeline.v1;

service TimelineService {
  rpc ListHomeTimeline (ListHomeTimelineRequest) returns (ListHomeTimelineResponse);
  rpc RebuildHomeTimeline (RebuildHomeTimelineRequest) returns (RebuildHomeTimelineResponse);
  rpc FanOutPost (FanOutPostRequest) returns (FanOutPostResponse);
}

message ListHomeTimelineRequest {
  string ownerUserId = 1;
  int32 limit = 2;
  string cursor = 3;
}

message TimelineEntry {
  string entryId = 1;
  string ownerUserId = 2;
  string sourcePostId = 3;
  string actorUserId = 4;
  string insertedAt = 5;
  double rankScore = 6;
  string activityType = 7;
}

message ListHomeTimelineResponse {
  repeated TimelineEntry entries = 1;
  string nextCursor = 2;
}

message RebuildHomeTimelineRequest {
  string ownerUserId = 1;
  int32 limit = 2;
  string cursor = 3;
}

message RebuildHomeTimelineResponse {
  repeated TimelineEntry entries = 1;
  string nextCursor = 2;
}

message FanOutPostRequest {
  string postId = 1;
  string authorUserId = 2;
  string createdAt = 3;
}

message FanOutPostResponse {
  int32 insertedCount = 1;
}

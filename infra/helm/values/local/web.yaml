nameOverride: web
fullnameOverride: web

image:
  repository: chirper/web
  tag: dev

service:
  ports:
    - name: http
      port: 80
      targetPort: 3000
      containerPort: 3000

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"
  - name: BFF_INTERNAL_URL
    value: http://bff
  - name: NEXT_PUBLIC_BFF_URL
    value: http://api.chirper.localtest.me:8088
  - name: SESSION_COOKIE_SECURE
    value: "false"

probes:
  liveness:
    enabled: true
    path: /
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    path: /
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: chirper.localtest.me
      paths:
        - path: /
          pathType: Prefix
          servicePortName: http
